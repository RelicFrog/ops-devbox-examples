# .github/workflows/ci-ws-python.yml — reusable wrapper for ws-python.

name: ws-python (reusable)

on:
  workflow_call:

env:
  PYTHON_VERSION: "3.13"

defaults:
  run:
    working-directory: ws-python

jobs:
  lint:
    name: Lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ruff + mypy
        run: pip install ruff==0.15.17 mypy==1.20.1
      - name: Format check
        run: ruff format --check src/ tests/
      - name: Lint
        run: ruff check src/ tests/
      - name: Type check
        run: mypy src/

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install pytest
        run: pip install pytest==9.0.3
      - name: Run tests
        run: |
          export PYTHONPATH="$PWD/src"
          pytest src/ tests/ -v
