#
# .github/workflows/ci-ws-rust.yml
#
# Reusable workflow wrapper for the ws-rust workspace.
# Called from the root CI pipeline (ci.yml) via `uses:`.
#
# The actual workflow logic lives in ws-rust/.github/workflows/ci.yml.
# This file acts as a thin adapter so the root pipeline can reference it
# using the standard `uses: ./.github/workflows/ci-ws-rust.yml` syntax.

name: ws-rust (reusable)

on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-D warnings"

defaults:
  run:
    working-directory: ws-rust

jobs:
  lint:
    name: Lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ws-rust

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Cache Rust artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ws-rust

      - name: Build
        run: cargo build --all

      - name: Test (nextest)
        run: cargo nextest run --all
