#
# .github/workflows/ci-ws-go.yml
#
# Reusable workflow wrapper for ws-go.
# Called from the root CI pipeline (ci.yml) via `uses:`.

name: ws-go (reusable)

on:
  workflow_call:

env:
  CGO_ENABLED: "0"
  GOVERSION: "1.24.13"

defaults:
  run:
    working-directory: ws-go

jobs:
  lint:
    name: Lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GOVERSION }}
          cache-dependency-path: ws-go/go.mod

      - name: Install gofumpt
        run: go install mvdan.cc/gofumpt@v0.10.0

      - name: Format check (gofumpt)
        run: test -z "$(gofumpt -l ./src)"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          working-directory: ws-go

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GOVERSION }}
          cache-dependency-path: ws-go/go.mod

      - name: Build
        run: go build -trimpath -o bin/primes-cli ./src/cmd/...

      - name: Test (race detector)
        env:
          CGO_ENABLED: "1"
        run: go test -race -count=1 ./src/... ./tests/...
