# ws-go/.pre-commit-config.yaml
#
# Pre-commit hook configuration for the ws-go workspace.
#
# All Go-specific hooks are defined as 'local' hooks that invoke the
# tooling directly. This ensures they always use the exact versions
# pinned in devbox.json rather than depending on an external hook repo.
#
# Install once inside the devbox shell:
#   pre-commit install
#
# Run manually against all files:
#   pre-commit run --all-files
#
# The devbox init_hook installs the hooks automatically on 'devbox shell'.

default_install_hook_types:
  - pre-commit

default_stages:
  - pre-commit

fail_fast: false

repos:
  # ---------------------------------------------------------------------------
  # Generic file hygiene (pre-commit/pre-commit-hooks)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        name: trim trailing whitespace
      - id: end-of-file-fixer
        name: fix end of file
      - id: check-yaml
        name: check yaml syntax
      - id: check-toml
        name: check toml syntax
      - id: check-merge-conflict
        name: check for merge conflicts
      - id: mixed-line-ending
        args: [--fix=lf]
        name: enforce LF line endings

  # ---------------------------------------------------------------------------
  # Go — local hooks (tooling from devbox Nix packages)
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      # --- Format check -------------------------------------------------------
      # gofumpt is a strict superset of gofmt. Fails if any file needs
      # reformatting. Fast: no compilation required.
      - id: go-fmt
        name: gofumpt (check)
        language: system
        entry: bash -c 'test -z "$(gofumpt -l ./src)"'
        types: [go]
        pass_filenames: false

      # --- Vet ----------------------------------------------------------------
      # go vet catches common errors that the compiler does not.
      - id: go-vet
        name: go vet
        language: system
        entry: go vet ./src/...
        types: [go]
        pass_filenames: false

      # --- Lint ---------------------------------------------------------------
      # golangci-lint runs multiple linters in one pass.
      - id: go-lint
        name: golangci-lint
        language: system
        entry: golangci-lint run ./src/...
        types: [go]
        pass_filenames: false
