# ws-zig/.github/workflows/ci.yml

name: ws-zig CI

on:
  push:
    branches: [main]
    paths:
      - "ws-zig/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "ws-zig/**"
      - ".github/workflows/ci.yml"
  workflow_call:

env:
  ZIG_VERSION: "0.14.1"

defaults:
  run:
    working-directory: ws-zig

jobs:
  lint:
    name: Lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Format check
        run: zig fmt --check src/

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build
        run: zig build -Doptimize=ReleaseSafe

      - name: Test
        run: zig build test
