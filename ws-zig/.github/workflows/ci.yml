# ws-zig/.github/workflows/ci.yml

name: ws-zig CI

on:
  push:
    branches: [main]
    paths:
      - "ws-zig/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "ws-zig/**"
      - ".github/workflows/ci.yml"
  workflow_call:

env:
  ZIG_VERSION: "0.14.1"

defaults:
  run:
    working-directory: ws-zig

jobs:
  lint:
    name: Lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Format check
        run: zig fmt --check src/

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: zig build -Doptimize=ReleaseSafe

      - name: Test (Linux)
        if: runner.os == 'Linux'
        run: zig build test

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p zig-out/bin
          zig build-exe src/main.zig \
            -O ReleaseSafe \
            -target aarch64-macos.15.0 \
            -lc \
            -femit-bin=zig-out/bin/primes-cli

      - name: Test (macOS)
        if: runner.os == 'macOS'
        run: |
          zig test src/primes.zig -target aarch64-macos.15.0 -lc
          zig test src/integration_test.zig -target aarch64-macos.15.0 -lc
