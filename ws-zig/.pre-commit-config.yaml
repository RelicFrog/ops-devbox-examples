# ws-zig/.pre-commit-config.yaml

default_install_hook_types:
  - pre-commit

default_stages:
  - pre-commit

fail_fast: false

repos:
  # ---------------------------------------------------------------------------
  # Generic file hygiene
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        name: trim trailing whitespace
      - id: end-of-file-fixer
        name: fix end of file
      - id: check-yaml
        name: check yaml syntax
      - id: check-merge-conflict
        name: check for merge conflicts
      - id: mixed-line-ending
        args: [--fix=lf]
        name: enforce LF line endings

  # ---------------------------------------------------------------------------
  # Zig — local hooks
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      # Format check — zig fmt is the canonical Zig formatter, no config needed
      - id: zig-fmt
        name: zig fmt (check)
        language: system
        entry: zig fmt --check src/
        types: [file]
        files: \.zig$
        pass_filenames: false
