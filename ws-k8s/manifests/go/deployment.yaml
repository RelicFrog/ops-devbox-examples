# ws-k8s/manifests/go/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: primes-go
  namespace: primes-workshop
  labels:
    app: primes-go
    lang: go
    example: devbox-workshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: primes-go
  template:
    metadata:
      labels:
        app: primes-go
        lang: go
    spec:
      containers:
        - name: primes-go
          image: primes-go:latest
          imagePullPolicy: Never
          # Default CMD keeps the container alive; kubectl exec calls /primes-cli directly
          resources:
            requests:
              cpu: "50m"
              memory: "16Mi"
            limits:
              cpu: "200m"
              memory: "64Mi"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsNonRoot: false
